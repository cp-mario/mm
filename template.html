<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Titulo añadido desde main.js al generar el html --> 
        <title>{{title}}</title>

        <!-- Estilos y scripts externos -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.8.4/dist/plyr.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
        <script src="https://cdn.jsdelivr.net/npm/plyr@3.8.4/dist/plyr.polyfilled.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
        
        <!-- Enlazar el script, el css y el css de la sidebar, y calacular la distancia a la raiz para tener el prefijo (prefix) --> 
        <script>
            const cacheBust = Date.now();
            const path = window.location.pathname;
            const parts = path.split("/").filter(p => p.length > 0);
            const rootIndex = parts.indexOf("pages");
            const depth = rootIndex === -1 ? 0 : parts.length - (rootIndex + 1);
            const prefix = "../".repeat(depth); 
            
            // Cargar script.js
            const script = document.createElement("script");
            script.src = prefix + "assetsInternos/script.js?" + cacheBust;
            document.head.appendChild(script);

            // Cargar style.css
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = prefix + "assetsInternos/style.css?" + cacheBust;
            document.head.appendChild(link);

            // Cargar styleSidebar.css
            const linkSidebar = document.createElement("link");
            linkSidebar.rel = "stylesheet";
            linkSidebar.href = prefix + "assetsInternos/styleSidebar.css?" + cacheBust;
            document.head.appendChild(linkSidebar);
        </script>

    </head>
    <body>
        <!-- Boton de sacar la sidebar -->
        <button id="icon-btn2">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M3 12h18M3 18h18" stroke="black" stroke-width="2"/>
          </svg>
        </button>
        <main>
            <!-- Donde se insertara el contenido de la pagina --> 
            {{content}}
            <div class="madeWithMMX">Made with <a target="_blank" href="https://github.com/cp-mario/MMX">MMX</a></div>
        </main>
        <!-- Donde se cargara la sidebar desde script.js -->
    </body>
    <style>

    </style>
</html>
